name: gyaawa
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16

  # Fonts & Text
  google_fonts: ^8.0.2

  # Screen Utilities
  flutter_screenutil: ^5.9.3

  # State Management & Navigation
  get: ^4.6.6

  # Loading & Animation
  loading_animation_widget: ^1.3.0
  shimmer: ^3.0.0
  shimmer_animation: ^2.2.2

  # Images & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^8.1.0
  flutter_image_compress: ^2.4.0
  carousel_slider: ^5.0.0

  # Input & Forms
  country_code_picker: ^3.4.1
  dropdown_button2: ^2.3.9
  pinput: ^5.0.0
  otp_timer_button: ^1.1.1
  dotted_border: ^2.1.0
  flutter_typeahead: ^5.2.0

  # Charts & Indicators
  fl_chart: ^0.69.2
  percent_indicator: ^4.2.4

  # Connectivity & Network
  connectivity_plus: ^6.1.1
  http: ^1.2.2
  dio: ^5.9.1

  # Storage & Preferences
  shared_preferences: ^2.3.5
  path: ^1.9.0
  path_provider: ^2.1.5

  # Firebase
#  firebase_core: ^3.15.2
#  firebase_messaging: ^15.2.0

  # Notifications & Messages
#  flutter_local_notifications: ^18.0.0
  fluttertoast: ^8.2.10
  another_flushbar: ^1.12.30

  # Utilities
  intl: ^0.20.1
  flutter_dotenv: ^5.2.1
  geocoding: ^3.0.0
  permission_handler: ^11.4.0
  upgrader: ^11.3.1
  uuid: ^4.5.1

  # UI Components
  flutter_advanced_switch: ^3.1.0
  colorful_safe_area: ^1.0.0

  # File & Share
  share_plus: ^10.1.4
  open_filex: ^4.7.0
  file_picker: ^10.3.6
  url_launcher: ^6.3.2

  # Payment
  pay_with_paystack: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/fonts/rubik/
    - assets/fonts/inter/
    - assets/fonts/onest/
    - assets/fonts/giliroy/
    - assets/.env

  fonts:
    # Rubik Fonts
    - family: rubikLight
      fonts:
        - asset: assets/fonts/rubik/Rubik-Light.ttf

    - family: rubikRegular
      fonts:
        - asset: assets/fonts/rubik/Rubik-Regular.ttf

    - family: rubikMedium
      fonts:
        - asset: assets/fonts/rubik/Rubik-Medium.ttf

    - family: rubikSemiBold
      fonts:
        - asset: assets/fonts/rubik/Rubik-SemiBold.ttf

    - family: rubikBold
      fonts:
        - asset: assets/fonts/rubik/Rubik-Bold.ttf

    - family: rubikExtraBold
      fonts:
        - asset: assets/fonts/rubik/Rubik-ExtraBold.ttf

    - family: rubikBlack
      fonts:
        - asset: assets/fonts/rubik/Rubik-Black.ttf

    # Inter Fonts
    - family: interLight
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Light.ttf

    - family: interRegular
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Regular.ttf

    - family: interMedium
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf

    - family: interSemiBold
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-SemiBold.ttf

    - family: interBold
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Bold.ttf

    - family: interExtraBold
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-ExtraBold.ttf

    # Gilroy Fonts
    - family: GilroyUltraLight
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-UltraLight.ttf

    - family: GilroyThin
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Thin.ttf

    - family: GilroyLight
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Light.ttf

    - family: GilroyRegular
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Regular.ttf

    - family: GilroyMedium
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Medium.ttf

    - family: GilroySemiBold
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-SemiBold.ttf

    - family: GilroyBold
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Bold.ttf

    - family: GilroyExtraBold
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-ExtraBold.ttf

    - family: GilroyHeavy
      fonts:
        - asset: assets/fonts/giliroy/Gilroy-Heavy.ttf

    # Onest Fonts
    - family: onestThin
      fonts:
        - asset: assets/fonts/onest/Onest-Thin.ttf

    - family: onestExtraLight
      fonts:
        - asset: assets/fonts/onest/Onest-ExtraLight.ttf

    - family: onestLight
      fonts:
        - asset: assets/fonts/onest/Onest-Light.ttf

    - family: onestRegular
      fonts:
        - asset: assets/fonts/onest/Onest-Regular.ttf

    - family: onestMedium
      fonts:
        - asset: assets/fonts/onest/Onest-Medium.ttf

    - family: onestSemiBold
      fonts:
        - asset: assets/fonts/onest/Onest-SemiBold.ttf

    - family: onestBold
      fonts:
        - asset: assets/fonts/onest/Onest-Bold.ttf

    - family: onestExtraBold
      fonts:
        - asset: assets/fonts/onest/Onest-ExtraBold.ttf

    - family: onestBlack
      fonts:
        - asset: assets/fonts/onest/Onest-Black.ttf